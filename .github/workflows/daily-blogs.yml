name: Daily Blog Generation

  on:
    schedule:
      - cron: "30 3 * * *"
    workflow_dispatch:
      inputs:
        post_num:
          description: "Specific post number to generate (leave empty for batch)"
          required: false
          type: string
        dry_run:
          description: "Dry run (generate locally, skip Shopify publish)"
          required: false
          type: boolean
          default: false

  jobs:
    generate-blogs:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: automate

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"
            cache: "pip"
            cache-dependency-path: automate/requirements.txt

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Run blog automation
          env:
            GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
            SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
            SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
            SHOPIFY_BLOG_ID: ${{ secrets.SHOPIFY_BLOG_ID }}
            POSTS_PER_DAY: ${{ vars.POSTS_PER_DAY || '3' }}
          run: |
            if [ "${{ github.event.inputs.post_num }}" != "" ]; then
              FLAGS="--post ${{ github.event.inputs.post_num }}"
            else
              FLAGS=""
            fi
            if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
              FLAGS="$FLAGS --dry-run"
            fi
            python main.py $FLAGS

        - name: Commit updated queue and generated posts
          run: |
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add automate/queue.json week*/
            git diff --staged --quiet || git commit -m "chore: auto-publish $(date +'%Y-%m-%d') blog batch"
            git push
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
